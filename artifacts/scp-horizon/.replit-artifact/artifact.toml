kind = "web"
previewPath = "/"
title = "SCP: Horizon"
version = "1.0.0"
id = "artifacts/scp-horizon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19792

[services.development]
run = "pnpm --filter @workspace/scp-horizon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scp-horizon", "run", "build" ]
publicDir = "artifacts/scp-horizon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19792"
BASE_PATH = "/"
